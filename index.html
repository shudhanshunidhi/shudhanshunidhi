<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal CEE Syllabus Tracker</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --primary: #2c3e50;
            --secondary: #3498db;
            --not-touched: #e74c3c;
            --little-confident: #f1c40f;
            --fully-confident: #2ecc71;
            --text-main: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .summary-dashboard {
            display: flex;
            justify-content: space-around;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }

        .summary-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .summary-box span.count {
            font-size: 24px;
            font-weight: bold;
        }

        .count.not-touched { color: var(--not-touched); }
        .count.little { color: #d35400; } /* Darker yellow/orange for contrast */
        .count.fully { color: var(--fully-confident); }

        .subject-section {
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .subject-header {
            background-color: var(--primary);
            color: white;
            padding: 15px 20px;
            font-size: 1.2rem;
            margin: 0;
        }

        .chapter-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .chapter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
            transition: background 0.3s ease;
        }

        .chapter-item:last-child {
            border-bottom: none;
        }

        .chapter-name {
            font-weight: 500;
        }

        select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-weight: bold;
            cursor: pointer;
            outline: none;
        }

        /* Status Colors for Select Dropdown */
        .status-not-touched { background-color: #fadbd8; color: #c0392b; }
        .status-little { background-color: #fcf3cf; color: #b9770e; }
        .status-fully { background-color: #d5f5e3; color: #1e8449; }

        @media (max-width: 600px) {
            .chapter-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .summary-dashboard {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🇳🇵 Nepal CEE Syllabus Tracker</h1>
        <p class="subtitle">Track your preparation progress for MECEE-UG</p>

        <!-- Progress Summary -->
        <div class="summary-dashboard">
            <div class="summary-box">
                <span class="count not-touched" id="count-not">0</span>
                <span>Not Touched 🔴</span>
            </div>
            <div class="summary-box">
                <span class="count little" id="count-little">0</span>
                <span>Little Confident 🟡</span>
            </div>
            <div class="summary-box">
                <span class="count fully" id="count-fully">0</span>
                <span>Fully Confident 🟢</span>
            </div>
        </div>

        <!-- Subjects Container -->
        <div id="syllabus-container"></div>
    </div>

    <script>
        // Nepal CEE (MECEE-UG) Standard Syllabus Data
        const ceeSyllabus = [
            {
                subject: "Physics",
                chapters: [
                    "Mechanics",
                    "Heat & Thermodynamics",
                    "Geometrical Optics & Physical Optics",
                    "Acoustics (Sound Waves)",
                    "Current Electricity & Magnetism",
                    "Modern Physics & Electronics"
                ]
            },
            {
                subject: "Chemistry",
                chapters: [
                    "Language of Chemistry & Atomic Structure",
                    "States of Matter & Thermodynamics",
                    "Chemical Kinetics & Equilibrium",
                    "Inorganic Chemistry (Metals & Non-metals)",
                    "Basic Concepts of Organic Chemistry",
                    "Hydrocarbons & Halocalkanes",
                    "Alcohols, Phenols & Ethers",
                    "Aldehydes, Ketones & Carboxylic Acids"
                ]
            },
            {
                subject: "Zoology",
                chapters: [
                    "Biology & Diversity of Microbes",
                    "Animal Tissues & Anatomy",
                    "Human Physiology (Digestion, Respiration, Circulation)",
                    "Human Physiology (Excretion, Nervous, Endocrine)",
                    "Human Reproduction & Development",
                    "Genetics & Evolution",
                    "Ecology & Environment"
                ]
            },
            {
                subject: "Botany",
                chapters: [
                    "Plant Anatomy & Physiology",
                    "Plant Diversity (Algae, Fungi, Bryophytes, Pteridophytes)",
                    "Gymnosperms & Angiosperms",
                    "Plant Reproduction",
                    "Genetics & Plant Breeding"
                ]
            },
            {
                subject: "MAT (Mental Agility Test)",
                chapters: [
                    "Numerical Reasoning",
                    "Logical Sequencing",
                    "Spatial Relation",
                    "Abstract Reasoning"
                ]
            }
        ];

        // Load saved progress from LocalStorage or initialize empty object
        let userProgress = JSON.parse(localStorage.getItem('ceeProgress')) || {};

        const container = document.getElementById('syllabus-container');

        // Function to render the syllabus to the screen
        function renderSyllabus() {
            container.innerHTML = ''; // Clear container

            ceeSyllabus.forEach((subjectObj, subjectIndex) => {
                // Create Subject Section
                const section = document.createElement('div');
                section.className = 'subject-section';
                
                // Subject Header
                const header = document.createElement('h2');
                header.className = 'subject-header';
                header.innerText = subjectObj.subject;
                section.appendChild(header);

                // Chapter List
                const list = document.createElement('ul');
                list.className = 'chapter-list';

                subjectObj.chapters.forEach((chapter, chapterIndex) => {
                    const uniqueId = `sub_${subjectIndex}_chap_${chapterIndex}`;
                    const currentStatus = userProgress[uniqueId] || 'not-touched';

                    const listItem = document.createElement('li');
                    listItem.className = 'chapter-item';

                    const chapterName = document.createElement('span');
                    chapterName.className = 'chapter-name';
                    chapterName.innerText = chapter;

                    // Dropdown for confidence level
                    const select = document.createElement('select');
                    select.className = getStatusClass(currentStatus);
                    
                    const options = [
                        { value: 'not-touched', text: '🔴 Not Touched' },
                        { value: 'little', text: '🟡 Little Confident' },
                        { value: 'fully', text: '🟢 Fully Confident' }
                    ];

                    options.forEach(opt => {
                        const optionElement = document.createElement('option');
                        optionElement.value = opt.value;
                        optionElement.innerText = opt.text;
                        if (opt.value === currentStatus) optionElement.selected = true;
                        select.appendChild(optionElement);
                    });

                    // Event Listener when user changes status
                    select.addEventListener('change', function(e) {
                        const newStatus = e.target.value;
                        userProgress[uniqueId] = newStatus;
                        select.className = getStatusClass(newStatus); // Update color
                        saveProgress();
                        updateDashboard();
                    });

                    listItem.appendChild(chapterName);
                    listItem.appendChild(select);
                    list.appendChild(listItem);
                });

                section.appendChild(list);
                container.appendChild(section);
            });

            updateDashboard();
        }

        // Helper function to assign CSS classes based on status
        function getStatusClass(status) {
            if (status === 'not-touched') return 'status-not-touched';
            if (status === 'little') return 'status-little';
            if (status === 'fully') return 'status-fully';
            return '';
        }

        // Save progress to Browser's Local Storage
        function saveProgress() {
            localStorage.setItem('ceeProgress', JSON.stringify(userProgress));
        }

        // Calculate and update the numbers at the top of the page
        function updateDashboard() {
            let notTouched = 0;
            let little = 0;
            let fully = 0;
            
            // Calculate total chapters
            const totalChapters = ceeSyllabus.reduce((acc, curr) => acc + curr.chapters.length, 0);

            // Count based on saved progress
            Object.values(userProgress).forEach(status => {
                if (status === 'not-touched') notTouched++;
                if (status === 'little') little++;
                if (status === 'fully') fully++;
            });

            // If a chapter isn't in userProgress yet, it means it's 'not-touched'
            const unrecorded = totalChapters - (notTouched + little + fully);
            notTouched += unrecorded;

            document.getElementById('count-not').innerText = notTouched;
            document.getElementById('count-little').innerText = little;
            document.getElementById('count-fully').innerText = fully;
        }

        // Initialize App
        renderSyllabus();

    </script>
</body>
</html>
